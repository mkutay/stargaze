name: Lint

on:
    push:
    pull_request:

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Install clang tools
              run: |
                  sudo apt-get update -q
                  sudo apt-get install -y clang-format-18

            - name: clang-format
              run: clang-format-18 --dry-run --Werror src/*.cpp src/*.hpp

    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Install clang
              run: |
                  sudo apt-get update -q
                  sudo apt-get install -y clang-18

            - name: Build
              run: make release
