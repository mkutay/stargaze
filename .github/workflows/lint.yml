name: Lint

on:
    push:
    pull_request:

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Install clang tools
              run: |
                  sudo apt-get update -q
                  sudo apt-get install -y clang-format

            - name: clang-format
              # Only first-party sources; src/crand is vendored third-party code.
              run: clang-format --dry-run --Werror src/*.cpp src/*.hpp tests/*.cpp tests/unit/*.cpp tests/integration/*.cpp

    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                compiler: [clang++, g++]

        steps:
            - uses: actions/checkout@v4

            - name: Install compiler
              run: |
                  sudo apt-get update -q
                  if [ "${{ matrix.compiler }}" = "clang++" ]; then
                      sudo apt-get install -y clang
                  else
                      sudo apt-get install -y g++
                  fi

            - name: Build
              run: make release CXX=${{ matrix.compiler }}

    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                compiler: [clang++, g++]

        steps:
            - uses: actions/checkout@v4

            - name: Install compiler
              run: |
                  sudo apt-get update -q
                  if [ "${{ matrix.compiler }}" = "clang++" ]; then
                      sudo apt-get install -y clang
                  else
                      sudo apt-get install -y g++
                  fi

            - name: Run tests
              run: make test CXX=${{ matrix.compiler }}
